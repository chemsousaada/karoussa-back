version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: autotrader
      POSTGRES_PASSWORD: autotrader
      POSTGRES_DB: autotrader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: autotrader
      DB_PASSWORD: autotrader
      DB_NAME: autotrader
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
    depends_on:
      - postgres
    command: npm run start:dev

volumes:
  postgres_data:
